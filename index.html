<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Alpha Token Volume Board</title>

  <script defer src="/_vercel/insights/script.js"></script>

  <style>
    :root{ --bg:#f9fafb;--text:#1f2937;--sub:#6b7280;--border:#e5e7eb; --green:#16a34a;--red:#dc2626;--primary:#2563eb }
    @media(prefers-color-scheme:dark){
      :root{--bg:#1e293b;--text:#f3f4f6;--sub:#9ca3af;--border:#334155}
    }
    :root.dark{--bg:#1e293b;--text:#f3f4f6;--sub:#9ca3af;--border:#334155}
    :root.light{--bg:#f9fafb;--text:#1f2937;--sub:#6b7280;--border:#e5e7eb}
    #themeBtn,#langBtn{background:transparent;border:1px solid var(--border);color:var(--text);border-radius:4px;padding:4px 8px;cursor:pointer;font-size:.85rem}
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:-apple-system,"Segoe UI","PingFang SC",sans-serif;
      background:var(--bg);color:var(--text);line-height:1.5
    }
    h1{padding:18px 12px;text-align:center;font-size:1.35rem;color:var(--primary)}

    /* 最后更新时间 */
    .last-up{ text-align:center;font-size:.8rem;color:var(--sub);margin-top:-6px;margin-bottom:12px }

    /* ---------- 顶栏 ---------- */
    #bar{
      max-width:1200px;margin:0 auto 12px;
      display:flex;flex-direction:column;gap:8px;
      padding:0 6px
    }
    #bar-row1{display:flex;flex-wrap:wrap;align-items:center;gap:8px}
    #bar-row1 input[type="search"]{flex:1;min-width:160px}
    #bar-row2{display:flex;flex-wrap:wrap;align-items:center;gap:8px}
    #bar-row2 input[type="text"]{width:120px}
    #bar-row2 input[type="datetime-local"]{width:190px}
    #bar input{
      padding:6px 8px;border:1px solid var(--border);border-radius:4px;font-size:.85rem
    }
    .btn{
      display:inline-flex;align-items:center;gap:4px;
      padding:6px 12px;font-size:.85rem;border:1px solid var(--primary);
      color:#fff;background:var(--primary);border-radius:4px;cursor:pointer
    }
    .btn[disabled]{background:#9ca3af;border-color:#9ca3af;cursor:not-allowed}
    .badge{ /* 仅用于进度百分比 */
      display:none;padding:0 6px;border-radius:10px;font-size:.7rem;font-weight:700;
      background:#fff;color:var(--primary)
    }
    #bar-right{display:flex;align-items:center;gap:8px;flex-shrink:0;margin-left:auto}
    #author{font-size:.8rem;white-space:nowrap}
    #author a{color:var(--primary);text-decoration:none}

    /* 新增：过滤开关 */
    .chk{
      display:inline-flex;align-items:center;gap:6px;
      font-size:.85rem;color:var(--text);user-select:none
    }

    /* ---------- 广告位 ---------- */
    .ad{
      max-width:1200px;margin:0 auto 10px;padding:8px 10px;
      display:flex;align-items:center;gap:10px;flex-wrap:wrap;
      border:1px dashed var(--border);border-radius:6px;background:rgba(0,0,0,.02)
    }
    .ad-badge{
      font-size:.68rem;padding:0 6px;border-radius:8px;color:#fff;background:#6b7280
    }
    .ad-note{font-size:.82rem;color:var(--primary)}
    .ad-links{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap}
    .ad .btn{padding:6px 10px}

    /* ✅ Telegram 徽章 */
    .tg-badge{
      display:inline-flex;align-items:center;gap:6px;
      font-size:.75rem;padding:2px 8px;border-radius:10px;
      color:#fff;background:#229ED9;text-decoration:none;line-height:1.6
    }
    .tg-badge:hover{opacity:.9}
    .tg-badge .icon{font-size:.9rem;line-height:1}

    /* ---------- 表格 ---------- */
    .table-wrap{max-width:1200px;margin:0 auto;overflow-x:auto;-webkit-overflow-scrolling:touch}
    table{ width:100%;border-collapse:collapse;min-width:620px }
    th,td{
      padding:10px 6px;border-bottom:1px solid var(--border);
      font-size:.85rem;text-align:left;white-space:nowrap
    }
    tbody tr:hover{background:rgba(0,0,0,.04);cursor:pointer}

    /* 手机端固定前3列（星标 + 序号 + 代币名） */
    @media(max-width:760px){
      th:nth-child(-n+3),td:nth-child(-n+3){position:sticky;background:var(--bg);z-index:1}
      th:nth-child(1),td:nth-child(1){left:0;min-width:26px}
      th:nth-child(2),td:nth-child(2){left:26px;min-width:28px}
      th:nth-child(3),td:nth-child(3){left:54px;box-shadow:2px 0 4px rgba(0,0,0,.06)}
    }

    th.sortable{cursor:pointer;user-select:none;position:relative}
    th.sortable::after{
      content:'▲';position:absolute;right:4px;font-size:.6rem;color:var(--sub);
      transform:scale(.8);opacity:0;transition:opacity .2s
    }
    th.sortable.desc::after{content:'▼';opacity:1}
    th.sortable.asc::after{content:'▲';opacity:1}

    /* Star */
    .star{cursor:pointer;font-size:1rem;color:var(--sub);user-select:none;transition:transform .15s,color .15s}
    .star.fav{color:#f7b500}.star.bounce{transform:scale(1.4)}

    /* 颜色 & 小字 */
    .logo{width:18px;height:18px;margin-right:4px;vertical-align:middle;border-radius:50%}
    .up{color:var(--green)}.down{color:var(--red)}
    .subl{display:block;font-size:.72rem;color:var(--sub)}

    /* ✅ 30天内上新标记 */
    .tag-new{
      display:inline-block;margin-left:6px;padding:0 6px;border-radius:10px;
      font-size:.68rem;line-height:1.4;border:1px solid var(--primary);
      color:var(--primary);background:rgba(37,99,235,.08)
    }

    /* ✅ 合约标记 */
    .tag-futures{
      display:inline-block;margin-left:4px;padding:0 5px;border-radius:10px;
      font-size:.68rem;line-height:1.4;border:1px solid #f59e0b;
      color:#f59e0b;background:rgba(245,158,11,.08);font-weight:700
    }

    /* Toast */
    #toast{
      position:fixed;bottom:40px;left:50%;transform:translateX(-50%);
      background:rgba(0,0,0,.8);color:#fff;padding:8px 16px;border-radius:6px;
      font-size:.85rem;opacity:0;pointer-events:none;transition:opacity .3s
    }

    /* 自定义区间结果 */
    #customVol{max-width:1200px;margin:4px auto 0;font-size:.9rem;color:var(--primary)}

    /* ---------- 小时交易量 ---------- */
    #hourlyWrap{max-width:1200px;margin:10px auto 0;padding:0 6px}
    .hourly-header{
      display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;
      padding:8px 12px;background:linear-gradient(135deg,rgba(37,99,235,.08),rgba(37,99,235,.02));
      border-radius:8px;border:1px solid rgba(37,99,235,.15)
    }
    .hourly-header .hourly-title{font-size:.9rem;color:var(--primary);font-weight:700}
    .hourly-header .hourly-total{
      font-size:.82rem;color:var(--text);font-weight:600;
      background:rgba(37,99,235,.1);padding:2px 10px;border-radius:12px
    }
    .hourly-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;
      background:repeating-linear-gradient(0deg,transparent,transparent 24px,var(--border) 24px,var(--border) 25px);
      border-radius:0 0 8px 8px;padding:8px 4px 0;border:1px solid var(--border);border-top:none
    }
    #hourlyWrap .hourly-bar{display:flex;align-items:flex-end;gap:4px;margin-top:0;min-width:max-content;padding-bottom:2px}
    #hourlyWrap .hourly-bar .h-col{
      display:flex;flex-direction:column;align-items:center;gap:2px;min-width:52px;flex:1;
      transition:transform .15s;cursor:default
    }
    #hourlyWrap .hourly-bar .h-col:hover{transform:scaleY(1.03) translateY(-1px)}
    #hourlyWrap .hourly-bar .h-col .h-bar{
      width:calc(100% - 8px);min-height:4px;border-radius:4px 4px 1px 1px;
      background:linear-gradient(180deg,#3b82f6,#2563eb);
      box-shadow:0 1px 3px rgba(37,99,235,.2);
      transition:height .4s cubic-bezier(.4,0,.2,1),opacity .3s
    }
    #hourlyWrap .hourly-bar .h-col:hover .h-bar{
      background:linear-gradient(180deg,#60a5fa,#3b82f6);
      box-shadow:0 2px 8px rgba(37,99,235,.35)
    }
    #hourlyWrap .hourly-bar .h-col .h-val{font-size:.68rem;color:var(--sub);font-weight:600;white-space:nowrap}
    #hourlyWrap .hourly-bar .h-col:hover .h-val{color:var(--primary)}
    #hourlyWrap .hourly-bar .h-col .h-lbl{font-size:.66rem;color:var(--sub);padding-bottom:2px}
    #hourlyWrap .hourly-bar .h-col.h-max .h-bar{background:linear-gradient(180deg,#22c55e,#16a34a);box-shadow:0 1px 3px rgba(22,163,74,.25)}
    #hourlyWrap .hourly-bar .h-col.h-max .h-val{color:var(--green);font-weight:700}
    #hourlyWrap .hourly-bar .h-col.h-min .h-bar{background:linear-gradient(180deg,#f87171,#dc2626);box-shadow:0 1px 3px rgba(220,38,38,.25)}
    #hourlyWrap .hourly-bar .h-col.h-min .h-val{color:var(--red);font-weight:700}
    @keyframes barGrow{from{transform:scaleY(0)}to{transform:scaleY(1)}}
    #hourlyWrap .hourly-bar .h-col .h-bar{transform-origin:bottom;animation:barGrow .5s cubic-bezier(.4,0,.2,1) both}

    /* ---------- 查询缓存记录 ---------- */
    #cacheWrap{max-width:1200px;margin:6px auto 0;padding:0 6px}
    .cache-hd{display:flex;align-items:center;gap:8px}
    #cacheToggle{font-size:.82rem;color:var(--primary);cursor:pointer;user-select:none;background:none;border:none}
    #cacheToggle:hover{text-decoration:underline}
    #cacheClearAll{font-size:.76rem;color:var(--red);cursor:pointer;background:none;border:1px solid var(--red);border-radius:4px;padding:1px 8px;display:none}
    #cacheClearAll:hover{background:rgba(220,38,38,.08)}
    /* hourly-total styles moved to #hourlyWrap section */
    #cacheList{margin-top:4px;display:none;border:1px solid var(--border);border-radius:6px;overflow:hidden;max-height:260px;overflow-y:auto}
    #cacheList .cache-item{
      display:flex;align-items:center;gap:8px;padding:6px 10px;font-size:.82rem;
      border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s
    }
    #cacheList .cache-item:last-child{border-bottom:none}
    #cacheList .cache-item:hover{background:rgba(37,99,235,.06)}
    #cacheList .cache-item .ci-info{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    #cacheList .cache-item .ci-del{
      color:var(--red);cursor:pointer;font-size:.78rem;padding:2px 6px;border-radius:4px;
      border:1px solid transparent;flex-shrink:0
    }
    #cacheList .cache-item .ci-del:hover{border-color:var(--red);background:rgba(220,38,38,.06)}
    #cacheList .cache-empty{padding:10px;text-align:center;font-size:.8rem;color:var(--sub)}

    footer{height:16px;margin-bottom:12px}

    /* ---------- 功能引导 ---------- */
    .guide-overlay{
      position:fixed;inset:0;z-index:9998;
      background:rgba(0,0,0,.55);
      transition:opacity .3s;
    }
    .guide-spotlight{
      position:fixed;z-index:9999;
      border-radius:8px;
      box-shadow:0 0 0 9999px rgba(0,0,0,.55), 0 0 0 3px var(--primary), 0 0 24px rgba(37,99,235,.35);
      transition:all .35s cubic-bezier(.4,0,.2,1);
      pointer-events:none;
    }
    .guide-tooltip{
      position:fixed;z-index:10000;
      background:var(--bg);color:var(--text);
      border:1px solid var(--primary);border-radius:12px;
      padding:16px 20px 14px;
      box-shadow:0 12px 40px rgba(0,0,0,.2);
      max-width:400px;min-width:260px;
      animation:guideIn .3s ease-out;
    }
    @keyframes guideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .guide-tooltip .guide-step{
      font-size:.7rem;color:var(--primary);font-weight:700;
      margin-bottom:4px;letter-spacing:.5px
    }
    .guide-tooltip .guide-title{
      font-size:.95rem;font-weight:700;margin-bottom:6px;line-height:1.4
    }
    .guide-tooltip .guide-desc{
      font-size:.82rem;color:var(--sub);line-height:1.6;margin-bottom:14px;
      max-height:45vh;overflow-y:auto
    }
    .guide-tooltip .guide-btns{
      display:flex;align-items:center;justify-content:space-between;gap:8px
    }
    .guide-tooltip .guide-btns button{
      padding:6px 16px;border-radius:6px;font-size:.82rem;cursor:pointer;
      border:1px solid var(--border);background:var(--bg);color:var(--text);
      transition:all .15s
    }
    .guide-tooltip .guide-btns button:hover{background:rgba(37,99,235,.06)}
    .guide-tooltip .guide-btns .guide-next{
      background:var(--primary);color:#fff;border-color:var(--primary);font-weight:700
    }
    .guide-tooltip .guide-btns .guide-next:hover{opacity:.9}
    .guide-dots{display:flex;gap:5px;align-items:center}
    .guide-dots span{
      width:7px;height:7px;border-radius:50%;
      background:var(--border);transition:all .2s
    }
    .guide-dots span.active{background:var(--primary);transform:scale(1.3)}
    #guideBtn{
      background:transparent;border:1px solid var(--border);color:var(--text);
      border-radius:4px;padding:4px 8px;cursor:pointer;font-size:.85rem
    }
    #guideBtn:hover{border-color:var(--primary);color:var(--primary)}

    /* ---------- 回到顶部按钮 ---------- */
    #backTop{
      position:fixed;bottom:32px;right:20px;width:40px;height:40px;
      border-radius:50%;border:1px solid var(--border);background:var(--bg);color:var(--text);
      font-size:1.1rem;cursor:pointer;display:none;align-items:center;justify-content:center;
      box-shadow:0 2px 8px rgba(0,0,0,.12);z-index:99;transition:opacity .3s
    }
    #backTop:hover{background:var(--primary);color:#fff;border-color:var(--primary)}

    @media(max-width:760px){
      #bar-row2 input[type="datetime-local"]{flex:1;min-width:140px}
      .ad-links{width:100%;justify-content:flex-start;margin-left:0}
    }

    /* =========================================================
       ✅ 仅优化广告位 ad-links 里的注册链接按钮 + 引导提示（不影响顶部按钮）
       ========================================================= */
    .ad-links{gap:10px;align-items:center; position:relative; padding-bottom:18px;}

    /* 覆盖广告区按钮尺寸与圆角 */
    .ad-links .btn{
      padding:9px 14px;
      border-radius:12px;
      font-weight:800;
      line-height:1.2;
      text-decoration:none;
      transition:transform .15s, box-shadow .15s, background .2s, color .2s, border-color .2s;
      white-space:nowrap;
    }
    .ad-links .btn:hover{
      transform:translateY(-1px);
      box-shadow:0 10px 22px rgba(0,0,0,.12);
    }

    /* ✅ 币安 & OKX 按钮：透明描边 + 推荐角标（合并重复样式） */
    .ad-links .btn-main,
    .ad-links .btn-ghost{
      background:transparent !important;
      border-color:var(--primary) !important;
      color:var(--primary) !important;
      position:relative;
    }
    .ad-links .btn-main:hover,
    .ad-links .btn-ghost:hover{
      background:rgba(37,99,235,.10) !important;
    }
    .ad-links .btn-main::after,
    .ad-links .btn-ghost::after{
      content:attr(data-badge);
      position:absolute;
      top:-8px; right:-8px;
      font-size:.68rem;
      padding:2px 6px;
      border-radius:999px;
      background:#f59e0b;
      color:#fff;
      box-shadow:0 8px 18px rgba(0,0,0,.16);
    }

    /* ✅ 引导标志：点击注册提醒（桌面端显示在按钮下方） */
    @keyframes hintNudge{
      0%,100%{ transform:translateX(-50%) translateY(0); }
      50%{ transform:translateX(-50%) translateY(-2px); }
    }
    .ad-links::after{
      content:attr(data-hint);
      position:absolute;
      left:50%;
      bottom:0;
      transform:translateX(-50%);
      font-size:.72rem;
      color:var(--sub);
      white-space:nowrap;
      pointer-events:none;
      opacity:.9;
      animation:hintNudge 1.4s ease-in-out 6;
    }

    /* 手机端：提示改为正常占位，避免绝对定位挤压布局 */
    @media(max-width:760px){
      .ad-links{ padding-bottom:0; }
      .ad-links::after{
        position:static;
        display:block;
        transform:none;
        animation:none;
        margin-top:6px;
        text-align:left;
      }
    }
  </style>
</head>
<body>
  <h1 id="title">Binance&nbsp;Alpha&nbsp;&mdash;&nbsp;24H&nbsp;交易量排行榜</h1>
  <p id="lastUp" class="last-up"></p>

  <div id="bar">
    <div id="bar-row1">
      <input id="search" type="search" placeholder="🔍 按代币名称 / 符号过滤…">
      <button id="refreshBtn" class="btn"> ⟳ <span data-i18n="refresh">刷新数据</span> <span id="progress" class="badge">0%</span> </button>
      <label class="chk"><input id="onlyNew" type="checkbox"> <span data-i18n="onlyNew">仅看30天内上新</span></label>
      <label class="chk"><input id="onlyFutures" type="checkbox"> <span data-i18n="onlyFutures">仅看有合约</span></label>
      <label class="chk"><input id="onlySec" type="checkbox"> <span data-i18n="onlySec">仅看代币化证券</span></label>
      <div id="bar-right">
        <button id="guideBtn" title="功能引导">?</button>
        <button id="langBtn" title="Switch Language">EN</button>
        <button id="themeBtn" title="切换深色/浅色模式">🌓</button>
        <div id="author"> 作者&nbsp;<a href="https://x.com/intent/follow?screen_name=0xXIAOc" target="_blank">@0xXIAOc</a> </div>
      </div>
    </div>
    <div id="bar-row2">
      <input id="tokenInput" type="text" placeholder="输入代币名称">
      <input id="startTime" type="datetime-local">
      <input id="endTime" type="datetime-local">
      <button id="rangeBtn" class="btn" data-i18n="rangeQuery">区间查询</button>
      <span style="margin-left:8px;color:var(--sub);font-size:.82rem">|</span>
      <input id="hourlyHours" type="number" min="1" max="72" value="6" style="width:52px" title="小时数">
      <button id="hourlyBtn" class="btn" data-i18n="hourlyQuery">小时交易量</button>
    </div>
  </div>

  <!-- 广告位 -->
  <div class="ad">
    <span class="ad-badge" data-i18n="adBadge">广告</span>
    <span class="ad-note"></span>

    <a class="tg-badge" href="https://t.me/+lKbtX0zMcAVjYjMx" target="_blank" rel="noopener noreferrer" aria-label="加入Alpha交流群" title="加入 Telegram 频道">
      <span class="icon">✈️</span> <span data-i18n="joinTg">加入Alpha交流群</span>
    </a>

    <div class="ad-links" data-hint="👆 点击上方按钮绑定邀请码" data-badge-text="推荐">
      <a class="btn btn-main" data-badge="推荐" href="https://web3.binance.com/referral?ref=XIAOCC" target="_blank" rel="noopener noreferrer" data-i18n="bnbReg">
        币安钱包注册｜手续费7折
      </a>
      <a class="btn btn-ghost" data-badge="推荐" href="https://web3.okx.com/ul/joindex?ref=XIAOCC" target="_blank" rel="noopener noreferrer" data-i18n="okxReg">
        OKX 钱包注册｜手续费8折
      </a>
    </div>
  </div>

  <div id="customVol"></div>
  <div id="hourlyWrap"></div>
  <div id="cacheWrap">
    <div class="cache-hd">
      <button id="cacheToggle" style="display:none"></button>
      <button id="cacheClearAll"></button>
    </div>
    <div id="cacheList"></div>
  </div>

  <div class="table-wrap">
  <table id="tokenTable">
    <thead>
      <tr>
        <th style="width:26px"></th><th>#</th><th id="thName">代币名字</th>
        <th id="thPrice">价格</th>
        <th id="thVol24h" class="sortable" data-key="vol24h">24H 交易量</th>
        <th id="thChg">24H 变化</th>
        <th id="thMarketCap" class="sortable" data-key="marketCap">流通市值</th>
        <th id="thFdv" class="sortable" data-key="fdv">完全稀释估值</th>
        <th id="thHolders" class="sortable" data-key="holders">持币人数</th>
        <th id="thToday" class="sortable" data-key="todayQV">当天限价单成交额</th>
        <th id="thPrev" class="sortable" data-key="prevQV">前一天限价单成交额</th>
      </tr>
    </thead>
    <tbody><tr><td colspan="11">加载中…</td></tr></tbody>
  </table>
  </div>

  <button id="backTop" title="回到顶部">↑</button>
  <div id="toast"></div>
  <footer></footer>

  <script>
    /* ========== i18n 多语言 ========== */
    const I18N = {
      zh: {
        title: 'Binance\u00a0Alpha\u00a0\u2014\u00a024H\u00a0交易量排行榜',
        searchPh: '🔍 按代币名称 / 符号过滤…',
        refresh: '刷新数据',
        onlyNew: '仅看30天内上新',
        onlyFutures: '仅看有合约',
        onlySec: '仅看代币化证券',
        tokenPh: '输入代币名称',
        rangeQuery: '区间查询',

    /* 智能价格格式化：小于 0.01 的价格自动显示更多有效位 */
    function fmtPrice(p){
      if(p>=1) return nf2.format(p);
      if(p>=0.01) return new Intl.NumberFormat('en-US',{minimumFractionDigits:4,maximumFractionDigits:4}).format(p);
      const s=p.toFixed(20);const m=s.match(/^0\.(0+)/);
      const zeros=m?m[1].length:0;
      return new Intl.NumberFormat('en-US',{minimumFractionDigits:zeros+3,maximumFractionDigits:zeros+3}).format(p);
    }
    /* 紧凑数字格式：1.2B / 10.5M / 800K */
    function fmtCompact(n){
      if(!n||n===0) return '-';
      if(n>=1e9) return (n/1e9).toFixed(2)+'B';
      if(n>=1e6) return (n/1e6).toFixed(2)+'M';
      if(n>=1e3) return (n/1e3).toFixed(1)+'K';
      return nf0.format(n);
    }

    function pLimit(n){
      const q=[];let run=0;
      const next=()=>{if(run>=n||!q.length)return;run++;q.shift()().finally(()=>{run--;next();});};
      return fn=>new Promise(res=>{q.push(()=>fn().then(res));next();});
    }

    // ------------------------------
    // ✅ K线成交额：优先 USDT，失败自动 fallback 到 USDC
    // ------------------------------
    async function qvOk(sym, start, end){
      if(start>=end) return { ok:true, vol:0, trades:0 };
      const url=`${K_API}?symbol=${encodeURIComponent(sym)}&interval=1h&startTime=${start}&endTime=${end}&limit=1500`;
      try{
        const json=await fetchWithTimeout(url).then(r=>r.json());

        const ok =
          (json?.success !== false) &&
          (json?.code == null || ['000000','0'].includes(String(json.code)));

        if(!ok) return { ok:false, vol:0, trades:0 };

        const data=json?.data;
        if(!Array.isArray(data)) return { ok:false, vol:0, trades:0 };

        const vol=data.reduce((s,k)=>s+parseFloat(k?.[7]||0),0);
        const trades=data.reduce((s,k)=>s+parseInt(k?.[8]||0),0);
        return { ok:true, vol, trades };
      }catch{
        return { ok:false, vol:0, trades:0 };
      }
    }

    async function qvAuto(row, start, end){
      const primary = row.qSym || row.sym; // row.sym 默认是 `${alphaId}USDT`
      let res = await qvOk(primary, start, end);
      if(res.ok) return { vol:res.vol, trades:res.trades };

      const alt = row.symUSDC || (row.sym && row.sym.endsWith('USDT') ? row.sym.replace(/USDT$/,'USDC') : '');
      if(!alt || alt===primary) return { vol:0, trades:0 };

      res = await qvOk(alt, start, end);
      if(res.ok){
        row.qSym = alt; // 缓存实际可用交易对
        return { vol:res.vol, trades:res.trades };
      }
      return { vol:0, trades:0 };
    }

    /* 公共：按名称/交易对查找代币行 */
    function findRow(sym){
      let row=rows.find(r=>
        r.symbol.toLowerCase()===sym.toLowerCase() ||
        (r.sym && r.sym.toLowerCase()===sym.toLowerCase()) ||
        (r.symUSDC && r.symUSDC.toLowerCase()===sym.toLowerCase()) ||
        (r.qSym && r.qSym.toLowerCase()===sym.toLowerCase())
      );
      if(!row){
        const m=sym.match(/_(\d+)/);
        if(m) row={sym:`${m[1]}USDT`,symUSDC:`${m[1]}USDC`,qSym:null,symbol:sym};
      }
      return row||null;
    }

    async function fillQVAll(list,today8,yest8,endTs){
      let done=0,total=list.length;

          qvAuto(r,today8,endTs),
          qvAuto(r,yest8,today8-1)
        ]);
        r.todayQV=todayRes.vol; r.prevQV=prevRes.vol;
        progressEl.textContent=`${Math.floor(++done/total*100)}%`;
      })));
      progressEl.style.display='none';
    }

      const resp=await fetchWithTimeout(LIST_API);
      if(!resp.ok)throw new Error('LIST_API Error');
      const {data=[]}=await resp.json();

      return data
        .filter(t => +t.volume24h > 0 || (t.stockState === true && t.rwaInfo != null))
        .map(t=>{
          const raw = Number(t.listingTime || 0);
          const ltMs = raw ? (raw < 1e12 ? raw*1000 : raw) : 0;
          const isNew = ltMs ? (Date.now() - ltMs) < THIRTY_DAYS : false;

          return {
            price:+t.price,
            vol24h:+t.volume24h,
            chg:+t.percentChange24h,
            marketCap:+(t.marketCap||0),
            fdv:+(t.fdv||0),
            holders:+(t.holders||0),
            symbol:t.symbol,
            icon:t.iconUrl,

            // ✅ 默认仍用 USDT 作为"身份 key"（收藏等不受影响）
            sym:`${t.alphaId}USDT`,
            // ✅ USDC 备选交易对
            symUSDC:`${t.alphaId}USDC`,
            // ✅ 缓存：实际能用的交易对（USDT/USDC）
            qSym:null,

            // ✅ null 表示"还在加载"；0 才是真正的 0
            todayQV:null,
            prevQV:null,

            listingTime: ltMs,
            listingTimeFmt: ltMs ? fmtFull(ltMs) : '',
            isNew,

            // 代币化证券：按上面的答案，用 stockState + rwaInfo 判断
            isTokenizedSecurity: t.stockState === true && t.rwaInfo != null,

            // ✅ 是否上了币安合约
            hasFutures: futuresSet.has(t.symbol.toUpperCase())
          };
        });
    }

    function sortRows(arr){
      const gv = o => (o[sortKey]==null ? 0 : o[sortKey]);
      return [...arr].sort((a,b)=>sortDir==='desc'?gv(b)-gv(a):gv(a)-gv(b));
    }
    function updateSortIcons(){
      document.querySelectorAll('th.sortable').forEach(th=>{
        th.classList.remove('asc','desc');
        if(th.dataset.key===sortKey)th.classList.add(sortDir);
      });
    }

    function render(){
      const favSet=new Set(favs());
      const filtered=rows.filter(r=>{
        const f = filter;
        const matched =
          r.symbol.toLowerCase().includes(f) ||
          (r.sym||'').toLowerCase().includes(f) ||
          (r.symUSDC||'').toLowerCase().includes(f) ||
          (r.qSym||'').toLowerCase().includes(f);

        const newOk = !showNewOnly || r.isNew;
        const futuresOk = !showFuturesOnly || r.hasFutures;
        const secOk = !showSecOnly || r.isTokenizedSecurity;
        return matched && newOk && futuresOk && secOk;
      });

      const sorted=sortRows(filtered);
      const display=[...sorted.filter(x=>favSet.has(x.sym)),...sorted.filter(x=>!favSet.has(x.sym))];

      tbody.innerHTML=display.map((r,i)=>{
        const left = r.isNew && r.listingTime ? daysLeft(r.listingTime) : 0;
        const tipPrefix = t('listingTip');

        return `
        <tr data-sym="${r.sym}">
          <td class="star ${favSet.has(r.sym)?'fav':''}">${favSet.has(r.sym)?'★':'☆'}</td>
          <td>${i+1}</td>
          <td title="${r.listingTimeFmt ? (tipPrefix+r.listingTimeFmt) : ''}">
            <img class="logo" loading="lazy" src="${r.icon}" referrerpolicy="no-referrer"
                 onerror="this.src='https://bin.bnbstatic.com/static/images/common/base-token-default.png'">
            ${r.symbol}
            ${r.hasFutures ? `<span class="tag-futures">${t('futuresTag')}</span>` : ''}
            ${r.isNew ? `<span class="tag-new" title="${tipPrefix}${r.listingTimeFmt}">${t('newTag')(left)}</span>` : ''}
          </td>
          <td>${fmtPrice(r.price)}</td>
          <td>${nf0.format(r.vol24h)}</td>
          <td class="${r.chg>=0?'up':'down'}">${r.chg.toFixed(2)}%</td>
          <td>${fmtCompact(r.marketCap)}</td>
          <td>${fmtCompact(r.fdv)}</td>
          <td>${r.holders ? nf0.format(r.holders) : '-'}</td>
          <td>${r.todayQV==null ? '…' : nf0.format(r.todayQV)}</td>
          <td>${r.prevQV==null  ? '…' : nf0.format(r.prevQV)}</td>
        </tr>
      `;
      }).join('');
      updateSortIcons();
    }

    async function reloadAll(){
      refreshBtn.disabled=true;progressEl.textContent='0%';
      const isFirstLoad=!rows||rows.length===0;
      if(isFirstLoad) tbody.innerHTML=`<tr><td colspan="11" style="text-align:center;padding:24px">加载中…</td></tr>`;
      const today8=nearest8UTC(),yest8=today8-864e5,endTs=Date.now();

      thToday.innerHTML=`${t('thTodayLabel')}<span class="subl">(${fmtShort(today8)}&nbsp;~&nbsp;${fmtShort(endTs)})</span>`;
      thPrev.innerHTML =`${t('thPrevLabel')}<span class="subl">(${fmtShort(yest8)}&nbsp;~&nbsp;${fmtShort(today8-1)})</span>`;

      try{
        const newRows=await fetchList();
        await fillQVAll(newRows,today8,yest8,endTs);
        rows=newRows;
        render();
        lastUpEl.textContent=`${t('lastUp')} ${fmtFull(Date.now())}`;
        window._boundary=today8;
      }catch(e){
        console.error(e);
        const msg=e.message||t('unknownErr');
        if(isFirstLoad) tbody.innerHTML=`<tr><td colspan="11">${t('failLoad')}${msg}</td></tr>`;
        showToast(`${t('failLoad')}${msg}`);
      }finally{
        refreshBtn.disabled=false;
      }
    }

    (function initDateInputs(){
      const now=new Date();
      const pad=n=>String(n).padStart(2,'0');
      const toLocal=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
      startEl.value=toLocal(new Date(nearest8UTC()));
      endEl.value =toLocal(now);
    })();

    rangeBtn.addEventListener('click',async()=>{
      const sym=tokenEl.value.trim();
      if(!sym){showToast(t('enterSym'));return;}
      const row=findRow(sym);
      if(!row){showToast(t('notFound'));return;}

      const st=new Date(startEl.value).getTime(),et=new Date(endEl.value).getTime();
      if(!st||!et||st>=et){showToast(t('badRange'));return;}

      rangeBtn.disabled=true;progressEl.textContent=t('querying');progressEl.style.display='inline-block';
      const res=await qvAuto(row,st,et);
      rangeBtn.disabled=false;progressEl.style.display='none';
      const avgPerTrade=res.trades>0?(res.vol/res.trades):0;
      customVolEl.innerHTML=t('rangeTpl')(row.symbol||sym, fmtFull(st), fmtFull(et), nf0.format(res.vol))
        + `<br>${t('tradeStats')(nf0.format(res.trades), nf0.format(Math.round(avgPerTrade)))}`;

      // 保存到缓存
      saveCache({symbol:row.symbol||sym, start:st, end:et, vol:res.vol, trades:res.trades, time:Date.now()});
    });

    /* ---------- 近N小时每小时交易量 ---------- */
    hourlyBtn.addEventListener('click',async()=>{
      const sym=tokenEl.value.trim();
      if(!sym){showToast(t('enterSym'));return;}
      const row=findRow(sym);
      if(!row){showToast(t('notFound'));return;}

      const hours=Math.max(1,Math.min(72,parseInt(hourlyHoursEl.value)||6));
      const now=Date.now();
      const endH=new Date(now);endH.setMinutes(0,0,0);
      const endTs=endH.getTime();
      const startTs=endTs-hours*3600000;
      const hasPartial=now-endTs>60000; // 超过1分钟才显示当前不完整小时

      hourlyBtn.disabled=true;progressEl.textContent=t('querying');progressEl.style.display='inline-block';

      const hourlyData=[];
      const totalSlots=hours+(hasPartial?1:0);
      let done=0;
      const tasks=[];
      for(let i=0;i<hours;i++){
        const hStart=startTs+i*3600000;
        const hEnd=hStart+3600000-1;
        tasks.push(limit(async()=>{
          const res=await qvAuto({...row},hStart,hEnd);
          hourlyData[i]={start:hStart,end:hEnd,vol:res.vol,trades:res.trades};
          progressEl.textContent=`${Math.floor(++done/totalSlots*100)}%`;
        }));
      }
      // 当前不完整小时
      if(hasPartial){
        tasks.push(limit(async()=>{
          const res=await qvAuto({...row},endTs,now);
          hourlyData[hours]={start:endTs,end:now,vol:res.vol,trades:res.trades,partial:true};
          progressEl.textContent=`${Math.floor(++done/totalSlots*100)}%`;
        }));
      }
      await Promise.all(tasks);

      hourlyBtn.disabled=false;progressEl.style.display='none';

      // 渲染柱状图
      const maxVol=Math.max(...hourlyData.map(d=>d.vol),1);
      const minVol=Math.min(...hourlyData.map(d=>d.vol));
      const totalVol=hourlyData.reduce((s,d)=>s+d.vol,0);
      const totalTrades=hourlyData.reduce((s,d)=>s+d.trades,0);
      const totalAvg=totalTrades>0?Math.round(totalVol/totalTrades):0;
      const maxBarH=120;
      const fmtHour=(ts,partial)=>{
        const d=new Date(ts);
        const hh=String(d.getHours()).padStart(2,'0');
        if(partial){const mm=String(d.getMinutes()).padStart(2,'0');return `${hh}:${mm}`;}
        return `${hh}:00`;
      };
      hourlyWrap.innerHTML=`<div class="hourly-header"><span class="hourly-title">${t('hourlyTpl')(row.symbol||sym,hours)}</span><span class="hourly-total">${t('hourlyTotal')(nf0.format(totalVol))}<br><small style="font-weight:normal;color:#888">${t('tradeStats')(nf0.format(totalTrades), nf0.format(totalAvg))}</small></span></div>
        <div class="hourly-scroll"><div class="hourly-bar">${hourlyData.map((d,i)=>{
          const h=Math.max(4,Math.round(d.vol/maxVol*maxBarH));
          const cls=hours>1&&d.vol===maxVol?'h-col h-max':hours>1&&d.vol===minVol?'h-col h-min':'h-col';
          const avg=d.trades>0?Math.round(d.vol/d.trades):0;
          return `<div class="${cls}">
            <div class="h-val">${nf0.format(d.vol)}<br><small style="color:#888;font-size:11px">${t('avgPerTrade')(nf0.format(avg))}</small></div>
            <div class="h-bar" style="height:${h}px;animation-delay:${i*30}ms"></div>
            <div class="h-lbl">${fmtHour(d.start,false)}${d.partial?'*':''}</div>
          </div>`;
        }).join('')}</div></div>`;

      // 保存小时查询到缓存
      saveCache({symbol:row.symbol||sym, start:startTs, end:endTs, vol:totalVol, trades:totalTrades, time:Date.now(), type:'hourly', hours});
    });

    /* ---------- 区间查询缓存记录 ---------- */
    function getCache(){try{return JSON.parse(localStorage.getItem(CACHE_KEY)||'[]');}catch{return [];}}
    function setCache(arr){localStorage.setItem(CACHE_KEY,JSON.stringify(arr));renderCache();}
    function saveCache(entry){
      const cache=getCache();
      cache.unshift(entry);
      if(cache.length>50)cache.length=50;
      setCache(cache);
    }
    function deleteCache(idx){
      const cache=getCache();cache.splice(idx,1);setCache(cache);
    }
    function clearAllCache(){
      localStorage.removeItem(CACHE_KEY);renderCache();
    }
    function loadCache(idx){
      const cache=getCache();
      const item=cache[idx];
      if(!item)return;
      customVolEl.innerHTML=t('rangeTpl')(item.symbol, fmtFull(item.start), fmtFull(item.end), nf0.format(item.vol))
        + (item.trades ? `<br>${t('tradeStats')(nf0.format(item.trades), nf0.format(Math.round(item.vol/item.trades)))}` : '');
      // 回填输入框，方便微调再查
      tokenEl.value=item.symbol;
      const pad=n=>String(n).padStart(2,'0');
      const toLocal=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
      startEl.value=toLocal(new Date(item.start));
      endEl.value=toLocal(new Date(item.end));
    }
    function renderCache(){
      const cache=getCache();
      const hasData=cache.length>0;
      cacheToggleBtn.style.display=hasData?'inline-block':'none';
      cacheClearAllBtn.style.display=(hasData&&cacheListEl.style.display==='block')?'inline-block':'none';
      cacheClearAllBtn.textContent=t('cacheClearAll');
      if(!hasData){cacheListEl.style.display='none';return;}
      const open=cacheListEl.style.display==='block';
      if(!open)return;
      cacheListEl.innerHTML=cache.map((c,i)=>{
        const typeBadge=c.type==='hourly'?`<span style="font-size:.68rem;padding:0 4px;border-radius:4px;background:rgba(37,99,235,.1);color:var(--primary);margin-right:4px">${c.hours||6}h</span>`:'';
        const timeStr=c.time?`<span style="color:var(--sub);font-size:.72rem;margin-left:6px">${t('cacheTime')} ${fmtFull(c.time)}</span>`:'';
        return `<div class="cache-item">
          <span class="ci-info" data-idx="${i}">${typeBadge}<strong>${c.symbol}</strong>&nbsp; ${fmtFull(c.start)} ~ ${fmtFull(c.end)}&nbsp; → ${nf0.format(c.vol)}${timeStr}</span>
          <span class="ci-del" data-delidx="${i}">${t('cacheDel')}</span>
        </div>`;
      }).join('');
    }
    cacheToggleBtn.addEventListener('click',()=>{
      const open=cacheListEl.style.display==='block';
      cacheListEl.style.display=open?'none':'block';
      cacheToggleBtn.textContent=open?t('cacheTitle'):t('cacheHide');
      cacheClearAllBtn.style.display=(!open&&getCache().length)?'inline-block':'none';
      if(!open)renderCache();
    });
    cacheClearAllBtn.addEventListener('click',()=>{
      clearAllCache();
      cacheListEl.style.display='none';
      cacheToggleBtn.textContent=t('cacheTitle');
      cacheClearAllBtn.style.display='none';
    });
    cacheListEl.addEventListener('click',e=>{
      const delBtn=e.target.closest('[data-delidx]');
      if(delBtn){e.stopPropagation();deleteCache(+delBtn.dataset.delidx);return;}
      const item=e.target.closest('[data-idx]');
      if(item)loadCache(+item.dataset.idx);
    });
    (function initCache(){
      const cache=getCache();
      if(cache.length){
        cacheToggleBtn.style.display='inline-block';
        cacheToggleBtn.textContent=t('cacheTitle');
      }
    })();

    document.getElementById('search').addEventListener('input',e=>{
      filter=e.target.value.trim().toLowerCase();render();
    });

    tbody.addEventListener('click',e=>{
      const s=e.target.closest('.star');
      if(s){s.classList.add('bounce');setTimeout(()=>s.classList.remove('bounce'),150);toggleFav(s.closest('tr').dataset.sym);return;}
      // 点击表格行自动填充代币名到输入框
      const tr=e.target.closest('tr');
      if(tr&&tr.dataset.sym){
        const row=rows.find(r=>r.sym===tr.dataset.sym);
        if(row){tokenEl.value=row.symbol;showToast(row.symbol);}
      }
    });

    document.querySelectorAll('th.sortable').forEach(th=>{
      th.addEventListener('click',()=>{
        const key=th.dataset.key;
        sortDir=(sortKey===key&&sortDir==='desc')?'asc':'desc';sortKey=key;render();
      });
    });

    onlyNewEl.addEventListener('change', (e)=>{
      showNewOnly = e.target.checked;
      render();
    });

    onlyFuturesEl.addEventListener('change', (e)=>{
      showFuturesOnly = e.target.checked;
      render();
    });

    onlySecEl.addEventListener('change', (e)=>{
      showSecOnly = e.target.checked;
      render();
    });

    refreshBtn.addEventListener('click', reloadAll);

    document.addEventListener('visibilitychange',()=>{
      if(document.visibilityState==='visible'&&nearest8UTC()!==window._boundary)reloadAll();
    });
    setInterval(()=>{if(document.visibilityState==='visible')reloadAll();},300000);

    /* ---------- 深色模式切换 ---------- */
    (function initTheme(){
      const saved=localStorage.getItem('theme');
      if(saved)document.documentElement.classList.add(saved);
    })();
    document.getElementById('themeBtn').addEventListener('click',()=>{
      const root=document.documentElement;
      const isDark=root.classList.contains('dark')||(
        !root.classList.contains('light')&&matchMedia('(prefers-color-scheme:dark)').matches
      );
      root.classList.remove('dark','light');
      root.classList.add(isDark?'light':'dark');
      localStorage.setItem('theme',isDark?'light':'dark');
    });

    /* ---------- 语言切换 ---------- */
    document.getElementById('langBtn').addEventListener('click',()=>{
      curLang = curLang==='zh' ? 'en' : 'zh';
      localStorage.setItem('lang', curLang);
      applyI18n();
      // 刷新表头时间 & 表格内容
      const today8=nearest8UTC(),yest8=today8-864e5,endTs=Date.now();
      thToday.innerHTML=`${t('thTodayLabel')}<span class="subl">(${fmtShort(today8)}&nbsp;~&nbsp;${fmtShort(endTs)})</span>`;
      thPrev.innerHTML =`${t('thPrevLabel')}<span class="subl">(${fmtShort(yest8)}&nbsp;~&nbsp;${fmtShort(today8-1)})</span>`;
      render();
    });

    /* ---------- 回到顶部 ---------- */
    const backTopBtn=document.getElementById('backTop');
    window.addEventListener('scroll',()=>{
      backTopBtn.style.display=window.scrollY>300?'flex':'none';
    },{passive:true});
    backTopBtn.addEventListener('click',()=>{
      window.scrollTo({top:0,behavior:'smooth'});
    });

    /* ---------- 功能引导 ---------- */
    (function initGuide(){
      let curStep=0, overlayEl=null, spotEl=null, tipEl=null, running=false;

      // 每一步对应的 DOM 选择器
      const stepTargets=[
        '#bar-row1',       // 搜索 & 过滤
        '#bar-row2',       // 区间查询
        '#bar-row2',       // 小时交易量（同一行，不同按钮）
        '#tokenTable thead th:first-child', // 收藏星标
        '#tokenTable thead',                // 市场数据列
        '#tokenTable thead',                // 排序
        '#tokenTable tbody',                // 点击行
        '#bar-right'                        // 深色模式 & 语言
      ];

      function getSteps(){ return t('guideSteps'); }

      function createEls(){
        overlayEl=document.createElement('div');
        overlayEl.className='guide-overlay';
        overlayEl.addEventListener('click', stop);

        spotEl=document.createElement('div');
        spotEl.className='guide-spotlight';

        tipEl=document.createElement('div');
        tipEl.className='guide-tooltip';

        document.body.append(overlayEl, spotEl, tipEl);
      }

      function removeEls(){
        [overlayEl, spotEl, tipEl].forEach(el=>el&&el.remove());
        overlayEl=spotEl=tipEl=null;
      }

      function positionTip(rect){
        const pad=12, tw=tipEl.offsetWidth, th=tipEl.offsetHeight;
        const vw=window.innerWidth, vh=window.innerHeight;
        let top, left;

        // 优先放下方
        if(rect.bottom+pad+th < vh){
          top=rect.bottom+pad;
        } else if(rect.top-pad-th > 0){
          top=rect.top-pad-th;
        } else {
          top=Math.max(8, vh/2-th/2);
        }
        left=Math.max(8, Math.min(rect.left, vw-tw-8));
        tipEl.style.top=top+'px';
        tipEl.style.left=left+'px';
      }

      function showStep(){
        const steps=getSteps();
        const s=steps[curStep];
        const target=document.querySelector(stepTargets[curStep]);
        const rect=target?target.getBoundingClientRect():{top:100,left:100,width:200,height:40,bottom:140,right:300};

        // spotlight
        const sp=6;
        spotEl.style.top=(rect.top-sp)+'px';
        spotEl.style.left=(rect.left-sp)+'px';
        spotEl.style.width=(rect.width+sp*2)+'px';
        spotEl.style.height=(rect.height+sp*2)+'px';

        // dots
        const dots=steps.map((_,i)=>`<span class="${i===curStep?'active':''}"></span>`).join('');

        tipEl.innerHTML=`
          <div class="guide-step">STEP ${curStep+1} / ${steps.length}</div>
          <div class="guide-title">${s.title}</div>
          <div class="guide-desc">${s.desc}</div>
          <div class="guide-btns">
            <div class="guide-dots">${dots}</div>
            <div style="display:flex;gap:6px">
              ${curStep>0?`<button class="guide-prev">${t('guidePrev')}</button>`:`<button class="guide-skip">${t('guideSkip')}</button>`}
              <button class="guide-next">${curStep<steps.length-1?t('guideNext'):t('guideDone')}</button>
            </div>
          </div>
        `;

        tipEl.querySelector('.guide-next').addEventListener('click',()=>{
          if(curStep<steps.length-1){curStep++;showStep();}else stop();
        });
        const prevBtn=tipEl.querySelector('.guide-prev');
        if(prevBtn) prevBtn.addEventListener('click',()=>{curStep--;showStep();});
        const skipBtn=tipEl.querySelector('.guide-skip');
        if(skipBtn) skipBtn.addEventListener('click', stop);

        // 需要先渲染才能算位置
        requestAnimationFrame(()=>positionTip(rect));
      }

      function start(){
        if(running) return;
        running=true; curStep=0;
        createEls();
        showStep();
        document.body.style.overflow='hidden';
      }

      function stop(){
        if(!running) return;
        running=false;
        removeEls();
        document.body.style.overflow='';
      }

      document.getElementById('guideBtn').addEventListener('click', start);
    })();

    /* ---------- 初始化 ---------- */
    applyI18n();
    // 先拉合约列表，再加载主数据
    fetchFutures().then(()=>reloadAll());
  </script>
</body>
