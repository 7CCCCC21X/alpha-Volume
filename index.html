<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Alpha Token Volume Board</title>

  <!-- ↓↓↓ Vercel Web Analytics ↓↓↓ -->
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>

  <style>
    :root{ --bg:#f9fafb;--text:#1f2937;--sub:#6b7280;--border:#e5e7eb; --green:#16a34a;--red:#dc2626;--primary:#2563eb }
    @media(prefers-color-scheme:dark){
      :root{--bg:#1e293b;--text:#f3f4f6;--sub:#9ca3af;--border:#334155}
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:-apple-system,"Segoe UI","PingFang SC",sans-serif;
      background:var(--bg);color:var(--text);line-height:1.5
    }
    h1{padding:18px 12px;text-align:center;font-size:1.35rem;color:var(--primary)}

    /* 最后更新时间 */
    .last-up{ text-align:center;font-size:.8rem;color:var(--sub);margin-top:-6px;margin-bottom:12px }

    /* ---------- 顶栏 ---------- */
    #bar{
      max-width:1200px;margin:0 auto 12px;
      display:flex;flex-wrap:wrap;align-items:center;gap:8px;
      padding:0 6px
    }
    #bar-left{flex:1;display:flex;flex-wrap:wrap;align-items:center;gap:8px}
    #bar-left input[type="search"]{flex:1;min-width:160px}
    #bar-left input[type="text"]{width:120px}
    #bar-left input[type="datetime-local"]{width:190px}
    #bar-left input{
      padding:6px 8px;border:1px solid var(--border);border-radius:4px;font-size:.85rem
    }
    .btn{
      display:inline-flex;align-items:center;gap:4px;
      padding:6px 12px;font-size:.85rem;border:1px solid var(--primary);
      color:#fff;background:var(--primary);border-radius:4px;cursor:pointer
    }
    .btn[disabled]{background:#9ca3af;border-color:#9ca3af;cursor:not-allowed}
    .badge{ /* 仅用于进度百分比 */
      display:none;padding:0 6px;border-radius:10px;font-size:.7rem;font-weight:700;
      background:#fff;color:var(--primary)
    }
    #author{font-size:.8rem;white-space:nowrap}
    #author a{color:var(--primary);text-decoration:none}

    /* 新增：过滤开关 */
    .chk{
      display:inline-flex;align-items:center;gap:6px;
      font-size:.85rem;color:var(--text);user-select:none
    }

    /* ---------- 广告位 ---------- */
    .ad{
      max-width:1200px;margin:0 auto 10px;padding:8px 10px;
      display:flex;align-items:center;gap:10px;flex-wrap:wrap;
      border:1px dashed var(--border);border-radius:6px;background:rgba(0,0,0,.02)
    }
    .ad-badge{
      font-size:.68rem;padding:0 6px;border-radius:8px;color:#fff;background:#6b7280
    }
    .ad-note{font-size:.82rem;color:var(--primary)}
    .ad-links{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap}
    .ad .btn{padding:6px 10px}

    /* ✅ Telegram 徽章 */
    .tg-badge{
      display:inline-flex;align-items:center;gap:6px;
      font-size:.75rem;padding:2px 8px;border-radius:10px;
      color:#fff;background:#229ED9;text-decoration:none;line-height:1.6
    }
    .tg-badge:hover{opacity:.9}
    .tg-badge .icon{font-size:.9rem;line-height:1}

    /* ---------- 表格 ---------- */
    table{ width:100%;max-width:1200px;margin:0 auto;border-collapse:collapse;min-width:620px }
    th,td{
      padding:10px 6px;border-bottom:1px solid var(--border);
      font-size:.85rem;text-align:left;white-space:nowrap
    }
    tbody tr:hover{background:rgba(0,0,0,.04);cursor:pointer}
    th.sortable{cursor:pointer;user-select:none;position:relative}
    th.sortable::after{
      content:'▲';position:absolute;right:4px;font-size:.6rem;color:var(--sub);
      transform:scale(.8);opacity:0;transition:opacity .2s
    }
    th.sortable.desc::after{content:'▼';opacity:1}
    th.sortable.asc::after{content:'▲';opacity:1}

    /* Star */
    .star{cursor:pointer;font-size:1rem;color:var(--sub);user-select:none;transition:transform .15s,color .15s}
    .star.fav{color:#f7b500}.star.bounce{transform:scale(1.4)}

    /* 颜色 & 小字 */
    .logo{width:18px;height:18px;margin-right:4px;vertical-align:middle;border-radius:50%}
    .up{color:var(--green)}.down{color:var(--red)}
    .subl{display:block;font-size:.72rem;color:var(--sub)}

    /* ✅ 30天内上新标记 */
    .tag-new{
      display:inline-block;margin-left:6px;padding:0 6px;border-radius:10px;
      font-size:.68rem;line-height:1.4;border:1px solid var(--primary);
      color:var(--primary);background:rgba(37,99,235,.08)
    }

    /* Toast */
    #toast{
      position:fixed;bottom:40px;left:50%;transform:translateX(-50%);
      background:rgba(0,0,0,.8);color:#fff;padding:8px 16px;border-radius:6px;
      font-size:.85rem;opacity:0;pointer-events:none;transition:opacity .3s
    }

    /* 自定义区间结果 */
    #customVol{max-width:1200px;margin:4px auto 0;font-size:.9rem;color:var(--primary)}
    footer{height:16px;margin-bottom:12px}

    @media(max-width:760px){
      #bar-left input[type="datetime-local"]{flex:1;min-width:140px}
      .ad-links{width:100%;justify-content:flex-start;margin-left:0}
    }

    /* =========================================================
       ✅ 仅优化广告位 ad-links 里的注册链接按钮 + 引导提示（不影响顶部按钮）
       ========================================================= */
    .ad-links{gap:10px;align-items:center; position:relative; padding-bottom:18px;}

    /* 覆盖广告区按钮尺寸与圆角 */
    .ad-links .btn{
      padding:9px 14px;
      border-radius:12px;
      font-weight:800;
      line-height:1.2;
      text-decoration:none;
      transition:transform .15s, box-shadow .15s, background .2s, color .2s, border-color .2s;
      white-space:nowrap;
    }
    .ad-links .btn:hover{
      transform:translateY(-1px);
      box-shadow:0 10px 22px rgba(0,0,0,.12);
    }

    /* ✅ 币安 & OKX 按钮：透明描边 + 推荐角标（合并重复样式） */
    .ad-links .btn-main,
    .ad-links .btn-ghost{
      background:transparent !important;
      border-color:var(--primary) !important;
      color:var(--primary) !important;
      position:relative;
    }
    .ad-links .btn-main:hover,
    .ad-links .btn-ghost:hover{
      background:rgba(37,99,235,.10) !important;
    }
    .ad-links .btn-main::after,
    .ad-links .btn-ghost::after{
      content:"推荐";
      position:absolute;
      top:-8px; right:-8px;
      font-size:.68rem;
      padding:2px 6px;
      border-radius:999px;
      background:#f59e0b;
      color:#fff;
      box-shadow:0 8px 18px rgba(0,0,0,.16);
    }

    /* ✅ 引导标志：点击注册提醒（桌面端显示在按钮下方） */
    @keyframes hintNudge{
      0%,100%{ transform:translateX(-50%) translateY(0); }
      50%{ transform:translateX(-50%) translateY(-2px); }
    }
    .ad-links::after{
      content:"👆 点击上方按钮绑定邀请码";
      position:absolute;
      left:50%;
      bottom:0;
      transform:translateX(-50%);
      font-size:.72rem;
      color:var(--sub);
      white-space:nowrap;
      pointer-events:none;
      opacity:.9;
      animation:hintNudge 1.4s ease-in-out 6;
    }

    /* 手机端：提示改为正常占位，避免绝对定位挤压布局 */
    @media(max-width:760px){
      .ad-links{ padding-bottom:0; }
      .ad-links::after{
        position:static;
        display:block;
        transform:none;
        animation:none;
        margin-top:6px;
        text-align:left;
      }
    }
  </style>
</head>
<body>
  <h1>Binance&nbsp;Alpha&nbsp;—&nbsp;24H&nbsp;交易量排行榜</h1>
  <p id="lastUp" class="last-up"></p>

  <div id="bar">
    <div id="bar-left">
      <input id="search" type="search" placeholder="🔍 按代币名称 / 符号过滤…">
      <button id="refreshBtn" class="btn"> ⟳ 刷新数据 <span id="progress" class="badge">0%</span> </button>

      <label class="chk"><input id="onlyNew" type="checkbox"> 仅看30天内上新</label>
      <input id="tokenInput" type="text" placeholder="输入代币名称">
      <input id="startTime" type="datetime-local">
      <input id="endTime" type="datetime-local">
      <button id="rangeBtn" class="btn">区间查询</button>
    </div>
    <div id="author"> 作者&nbsp;<a href="https://twitter.com/0xXIAOc" target="_blank">@0xXIAOc</a> </div>
  </div>

  <!-- 广告位 -->
  <div class="ad">
    <span class="ad-badge">广告</span>
    <span class="ad-note"></span>

    <a class="tg-badge" href="https://t.me/+lKbtX0zMcAVjYjMx" target="_blank" rel="noopener noreferrer" aria-label="加入Alpha交流群" title="加入 Telegram 频道">
      <span class="icon">✈️</span> 加入Alpha交流群
    </a>

    <div class="ad-links">
      <a class="btn btn-main" href="https://web3.binance.com/referral?ref=XIAOCC" target="_blank" rel="noopener noreferrer">
        币安钱包注册｜手续费7折
      </a>
      <a class="btn btn-ghost" href="https://web3.okx.com/ul/joindex?ref=XIAOCC" target="_blank" rel="noopener noreferrer">
        OKX 钱包注册｜手续费8折

  </div>

  <div id="customVol"></div>

  <table id="tokenTable">
    <thead>
      <tr>
        <th style="width:26px"></th><th>#</th><th>代币名字</th>
        <th id="thPrice">价格</th>
        <th id="thVol24h" class="sortable" data-key="vol24h">24H 交易量</th>
        <th>24H 变化</th>
        <th id="thToday" class="sortable" data-key="todayQV">当天限价单成交额</th>
        <th id="thPrev" class="sortable" data-key="prevQV">前一天限价单成交额</th>
      </tr>
    </thead>
    <tbody><tr><td colspan="8">加载中…</td></tr></tbody>
  </table>

  <div id="toast"></div>
  <footer></footer>

  <script>
    /* ---------- 常量 & 工具 ---------- */
    const LIST_API='https://www.binance.com/bapi/defi/v1/public/wallet-direct/buw/wallet/cex/alpha/all/token/list';
    const K_API ='https://www.binance.com/bapi/defi/v1/public/alpha-trade/klines';
    const nf0=new Intl.NumberFormat('en-US',{maximumFractionDigits:0});
    const nf2=new Intl.NumberFormat('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
    /* 智能价格格式化：小于 0.01 的价格自动显示更多有效位 */
    function fmtPrice(p){
      if(p>=1) return nf2.format(p);
      if(p>=0.01) return new Intl.NumberFormat('en-US',{minimumFractionDigits:4,maximumFractionDigits:4}).format(p);
      const s=p.toFixed(20);const m=s.match(/^0\.(0+)/);
      const zeros=m?m[1].length:0;
      return new Intl.NumberFormat('en-US',{minimumFractionDigits:zeros+3,maximumFractionDigits:zeros+3}).format(p);
    }
    const FAV_KEY='alphaFavs',CONCURRENCY=5;

    /* ✅ 严格 30 天（毫秒） */
    const THIRTY_DAYS = 29*24*60*60*1000;

    const fmtShort=ts=>new Intl.DateTimeFormat('zh-CN', {
      timeZone:'Asia/Shanghai',hour12:false,month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'
    }).format(new Date(ts)).replace(/\//g,'-');

    const fmtFull=ts=>new Intl.DateTimeFormat('zh-CN', {
      timeZone:'Asia/Shanghai',hour12:false,year:'numeric',month:'2-digit',day:'2-digit',
      hour:'2-digit',minute:'2-digit',second:'2-digit'
    }).format(new Date(ts)).replace(/\//g,'-');

    const nearest8UTC=()=>{
      const n=new Date(),b=new Date();
      b.setHours(8,0,0,0);
      if(n<b)b.setDate(b.getDate()-1);
      return b.getTime();
    };

    const daysLeft = (listingMs)=>{
      if(!listingMs) return 0;
      const delta = THIRTY_DAYS - (Date.now() - listingMs);
      return Math.max(0, Math.ceil(delta / 86400000));
    };

    /* ---------- DOM ---------- */
    const tbody=document.querySelector('#tokenTable tbody');
    const refreshBtn=document.getElementById('refreshBtn');
    const progressEl=document.getElementById('progress');
    const lastUpEl=document.getElementById('lastUp');
    const thToday=document.getElementById('thToday');
    const thPrev =document.getElementById('thPrev');
    const toast =document.getElementById('toast');
    const tokenEl=document.getElementById('tokenInput');
    const startEl=document.getElementById('startTime');
    const endEl =document.getElementById('endTime');
    const rangeBtn=document.getElementById('rangeBtn');
    const customVolEl=document.getElementById('customVol');
    const onlyNewEl=document.getElementById('onlyNew');

    function showToast(msg){
      toast.textContent=msg;toast.style.opacity='1';
      setTimeout(()=>toast.style.opacity='0',3000);
    }

    let rows=[],filter='',sortKey='todayQV',sortDir='desc',showNewOnly=false;
    window._boundary=nearest8UTC();

    function pLimit(n){
      const q=[];let run=0;
      const next=()=>{if(run>=n||!q.length)return;run++;q.shift()().finally(()=>{run--;next();});};
      return fn=>new Promise(res=>{q.push(()=>fn().then(res));next();});
    }
    const limit=pLimit(CONCURRENCY);

    // ------------------------------
    // ✅ K线成交额：优先 USDT，失败自动 fallback 到 USDC
    // ------------------------------
    async function qvOk(sym, start, end){
      if(start>=end) return { ok:true, vol:0 };
      const url=`${K_API}?symbol=${encodeURIComponent(sym)}&interval=1h&startTime=${start}&endTime=${end}&limit=1500`;
      try{
        const json=await fetch(url).then(r=>r.json());

        const ok =
          (json?.success !== false) &&
          (json?.code == null || ['000000','0'].includes(String(json.code)));

        if(!ok) return { ok:false, vol:0 };

        const data=json?.data;
        if(!Array.isArray(data)) return { ok:false, vol:0 };

        const vol=data.reduce((s,k)=>s+parseFloat(k?.[7]||0),0);
        return { ok:true, vol };
      }catch{
        return { ok:false, vol:0 };
      }
    }

    async function qvAuto(row, start, end){
      const primary = row.qSym || row.sym; // row.sym 默认是 `${alphaId}USDT`
      let res = await qvOk(primary, start, end);
      if(res.ok) return res.vol;

      const alt = row.symUSDC || (row.sym && row.sym.endsWith('USDT') ? row.sym.replace(/USDT$/,'USDC') : '');
      if(!alt || alt===primary) return 0;

      res = await qvOk(alt, start, end);
      if(res.ok){
        row.qSym = alt; // 缓存实际可用交易对
        return res.vol;
      }
      return 0;
    }

    async function fillQVAll(list,today8,yest8,endTs){
      let done=0,total=list.length;
      progressEl.style.display='inline-block';
      await Promise.all(list.map(r=>limit(async()=>{
        [r.todayQV,r.prevQV]=await Promise.all([
          qvAuto(r,today8,endTs),
          qvAuto(r,yest8,today8-1)
        ]);
        progressEl.textContent=`${Math.floor(++done/total*100)}%`;
      })));
      progressEl.style.display='none';
    }

    const favs=()=>{try{return JSON.parse(localStorage.getItem(FAV_KEY)||'[]');}catch{return [];}};
    function toggleFav(sym){
      const f=favs();const i=f.indexOf(sym);
      i>-1?f.splice(i,1):f.push(sym);
      localStorage.setItem(FAV_KEY,JSON.stringify(f));
      showToast(i>-1?'已移除收藏':'已加入收藏');
      render();
    }

    async function fetchList(){
      const resp=await fetch(LIST_API);
      if(!resp.ok)throw new Error('LIST_API Error');
      const {data=[]}=await resp.json();

      return data
        .filter(t=>+t.volume24h>0)
        .map(t=>{
          const raw = Number(t.listingTime || 0);
          const ltMs = raw ? (raw < 1e12 ? raw*1000 : raw) : 0;
          const isNew = ltMs ? (Date.now() - ltMs) < THIRTY_DAYS : false;

          return {
            price:+t.price,
            vol24h:+t.volume24h,
            chg:+t.percentChange24h,
            symbol:t.symbol,
            icon:t.iconUrl,

            // ✅ 默认仍用 USDT 作为“身份 key”（收藏等不受影响）
            sym:`${t.alphaId}USDT`,
            // ✅ USDC 备选交易对
            symUSDC:`${t.alphaId}USDC`,
            // ✅ 缓存：实际能用的交易对（USDT/USDC）
            qSym:null,

            // ✅ null 表示“还在加载”；0 才是真正的 0
            todayQV:null,
            prevQV:null,

            listingTime: ltMs,
            listingTimeFmt: ltMs ? fmtFull(ltMs) : '',
            isNew
          };
        });
    }

    function sortRows(arr){
      const gv = o => (o[sortKey]==null ? 0 : o[sortKey]);
      return [...arr].sort((a,b)=>sortDir==='desc'?gv(b)-gv(a):gv(a)-gv(b));
    }
    function updateSortIcons(){
      document.querySelectorAll('th.sortable').forEach(th=>{
        th.classList.remove('asc','desc');
        if(th.dataset.key===sortKey)th.classList.add(sortDir);
      });
    }

    function render(){
      const favSet=new Set(favs());
      const filtered=rows.filter(r=>{
        const f = filter;
        const matched =
          r.symbol.toLowerCase().includes(f) ||
          (r.sym||'').toLowerCase().includes(f) ||
          (r.symUSDC||'').toLowerCase().includes(f) ||
          (r.qSym||'').toLowerCase().includes(f);

        const newOk = !showNewOnly || r.isNew;
        return matched && newOk;
      });

      const sorted=sortRows(filtered);
      const display=[...sorted.filter(x=>favSet.has(x.sym)),...sorted.filter(x=>!favSet.has(x.sym))];

      tbody.innerHTML=display.map((t,i)=>{
        const left = t.isNew && t.listingTime ? daysLeft(t.listingTime) : 0;

        return `
        <tr data-sym="${t.sym}">
          <td class="star ${favSet.has(t.sym)?'fav':''}">${favSet.has(t.sym)?'★':'☆'}</td>
          <td>${i+1}</td>
          <td title="${t.listingTimeFmt ? ('上新：'+t.listingTimeFmt) : ''}">
            <img class="logo" loading="lazy" src="${t.icon}" referrerpolicy="no-referrer"
                 onerror="this.src='https://bin.bnbstatic.com/static/images/common/base-token-default.png'">
            ${t.symbol}
            ${t.isNew ? `<span class="tag-new" title="上新：${t.listingTimeFmt}">🆕 剩${left}天</span>` : ''}
          </td>
          <td>${fmtPrice(t.price)}</td>
          <td>${nf0.format(t.vol24h)}</td>
          <td class="${t.chg>=0?'up':'down'}">${t.chg.toFixed(2)}%</td>
          <td>${t.todayQV==null ? '…' : nf0.format(t.todayQV)}</td>
          <td>${t.prevQV==null  ? '…' : nf0.format(t.prevQV)}</td>
        </tr>
      `;
      }).join('');
      updateSortIcons();
    }

    async function reloadAll(){
      refreshBtn.disabled=true;progressEl.textContent='0%';
      const today8=nearest8UTC(),yest8=today8-864e5,endTs=Date.now();

      thToday.innerHTML=`当天限价单成交额<span class="subl">(${fmtShort(today8)}&nbsp;~&nbsp;${fmtShort(endTs)})</span>`;
      thPrev.innerHTML =`前一天限价单成交额<span class="subl">(${fmtShort(yest8)}&nbsp;~&nbsp;${fmtShort(today8-1)})</span>`;

      try{
        rows=await fetchList();
        await fillQVAll(rows,today8,yest8,endTs);
        render();
        lastUpEl.textContent=`最后更新时间： ${fmtFull(Date.now())}`;
        window._boundary=today8;
      }catch(e){
        console.error(e);
        const msg=e.message||'未知错误';
        tbody.innerHTML=`<tr><td colspan="8">加载失败：${msg}</td></tr>`;
        showToast(`加载失败：${msg}`);
      }finally{
        refreshBtn.disabled=false;
      }
    }

    (function initDateInputs(){
      const now=new Date();
      const pad=n=>String(n).padStart(2,'0');
      const toLocal=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
      startEl.value=toLocal(new Date(nearest8UTC()));
      endEl.value =toLocal(now);
    })();

    rangeBtn.addEventListener('click',async()=>{
      const sym=tokenEl.value.trim();
      if(!sym){showToast('请输入代币符号');return;}

      let row=rows.find(r=>
        r.symbol.toLowerCase()===sym.toLowerCase() ||
        (r.sym && r.sym.toLowerCase()===sym.toLowerCase()) ||
        (r.symUSDC && r.symUSDC.toLowerCase()===sym.toLowerCase()) ||
        (r.qSym && r.qSym.toLowerCase()===sym.toLowerCase())
      );

      if(!row){
        const m=sym.match(/_(\d+)/);
        if(m) row={
          sym:`${m[1]}USDT`,
          symUSDC:`${m[1]}USDC`,
          qSym:null,
          symbol:sym
        };
      }
      if(!row){showToast('未找到该代币');return;}

      const st=new Date(startEl.value).getTime(),et=new Date(endEl.value).getTime();
      if(!st||!et||st>=et){showToast('时间范围不合法');return;}

      rangeBtn.disabled=true;progressEl.textContent='查询…';progressEl.style.display='inline-block';
      const vol=await qvAuto(row,st,et);
      rangeBtn.disabled=false;progressEl.style.display='none';
      customVolEl.innerHTML=`<strong>${row.symbol||sym}</strong> 在&nbsp;<span>${fmtFull(st)}</span> ~ <span>${fmtFull(et)}</span> 的限价单成交额：<strong>${nf0.format(vol)}</strong>`;
    });

    document.getElementById('search').addEventListener('input',e=>{
      filter=e.target.value.trim().toLowerCase();render();
    });

    tbody.addEventListener('click',e=>{
      const s=e.target.closest('.star');
      if(s){s.classList.add('bounce');setTimeout(()=>s.classList.remove('bounce'),150);toggleFav(s.closest('tr').dataset.sym);}
    });

    document.querySelectorAll('th.sortable').forEach(th=>{
      th.addEventListener('click',()=>{
        const key=th.dataset.key;
        sortDir=(sortKey===key&&sortDir==='desc')?'asc':'desc';sortKey=key;render();
      });
    });

    onlyNewEl.addEventListener('change', (e)=>{
      showNewOnly = e.target.checked;
      render();
    });

    refreshBtn.addEventListener('click', reloadAll);

    document.addEventListener('visibilitychange',()=>{
      if(document.visibilityState==='visible'&&nearest8UTC()!==window._boundary)reloadAll();
    });
    setInterval(()=>{if(document.visibilityState==='visible')reloadAll();},300000);

    reloadAll();
  </script>
</body>
</html>
